org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Désactiver les caches incrémentaux Kotlin pour éviter les erreurs de chemins
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.jvm=false

# Note: Le support des pages mémoire de 16 KB est géré automatiquement par Flutter 3.24+ et les plugins récents
# Aucune configuration supplémentaire n'est nécessaire dans gradle.properties